<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - CropAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 200px);
            background-color: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .chat-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
            background-color: rgba(16, 185, 129, 0.05);
        }

        .bot-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .chat-messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            max-width: 80%;
            display: flex;
            gap: 1rem;
            animation: fadeIn 0.3s ease-out;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-content {
            padding: 1rem;
            border-radius: var(--radius-lg);
            line-height: 1.5;
        }

        .message.bot .message-content {
            background-color: var(--bg-light);
            border-top-left-radius: 0;
            color: var(--text-dark);
        }

        .message.user .message-content {
            background-color: var(--primary);
            color: white;
            border-top-right-radius: 0;
        }

        .chat-input-container {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            background-color: var(--surface);
        }

        .chat-form {
            display: flex;
            gap: 1rem;
        }

        .chat-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-full);
            border: 1px solid var(--border);
            background-color: var(--bg-light);
            font-size: 1rem;
            color: var(--text-dark);
            transition: var(--transition);
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--primary);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .send-btn:hover {
            background-color: var(--primary-dark);
            transform: scale(1.05);
        }

        .typing-indicator {
            display: none;
            gap: 0.5rem;
            padding: 1rem;
            background-color: var(--bg-light);
            border-radius: var(--radius-lg);
            border-top-left-radius: 0;
            width: fit-content;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--text-light);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="container nav-container" style="padding: 1rem;">
            <a href="dashboard.html" class="logo">
                <i class="fa-solid fa-leaf"></i> CropAI
            </a>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <span id="userNameDisplay" style="font-weight: 500;">User</span>
                <button id="logoutBtn" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Logout</button>
            </div>
        </div>
    </header>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <a href="dashboard.html" class="sidebar-link">
                <i class="fa-solid fa-house"></i> Home
            </a>
            <a href="crop.html" class="sidebar-link">
                <i class="fa-solid fa-seedling"></i> Crop Recommendation
            </a>
            <a href="disease.html" class="sidebar-link">
                <i class="fa-solid fa-bug"></i> Disease Detection
            </a>
            <a href="chatbot.html" class="sidebar-link active">
                <i class="fa-solid fa-robot"></i> AI Assistant
            </a>
            <a href="history.html" class="sidebar-link">
                <i class="fa-solid fa-clock-rotate-left"></i> Activity History
            </a>
        </aside>

        <main class="main-content">
            <h2 class="mb-4">Agricultural Assistant</h2>
            <p class="text-light mb-4">Powered by advanced AI (Groq LLaMA-3.3-70B)</p>

            <div class="chat-container">
                <div class="chat-header">
                    <div class="bot-avatar"><i class="fa-solid fa-robot"></i></div>
                    <div>
                        <h3 style="font-size: 1.1rem;">CropAI Expert</h3>
                        <p style="font-size: 0.8rem; color: var(--primary);">Online</p>
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="message bot">
                        <div class="bot-avatar" style="width: 32px; height: 32px; font-size: 1rem;"><i
                                class="fa-solid fa-robot"></i></div>
                        <div class="message-content">
                            Hello! I am your AI agriculture assistant. How can I help you today?
                        </div>
                    </div>
                    <!-- Messages will be appended here -->

                    <div class="message bot" id="typingIndicator" style="display: none;">
                        <div class="bot-avatar" style="width: 32px; height: 32px; font-size: 1rem;"><i
                                class="fa-solid fa-robot"></i></div>
                        <div class="typing-indicator" style="display: flex;">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                </div>

                <div class="chat-input-container">
                    <form class="chat-form" id="chatForm">
                        <input type="text" id="chatInput" class="chat-input" placeholder="Type your farming query..."
                            autocomplete="off">
                        <button type="submit" class="send-btn">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/chatbot.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }
            const user = Auth.getUser();
            if (user && user.name) {
                document.getElementById('userNameDisplay').textContent = user.name;
            }
            document.getElementById('logoutBtn').addEventListener('click', () => {
                Auth.logout();
            });
        });
    </script>
</body>

</html>
