<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CropAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-leaf"></i> CropAI
            </a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="register.html" class="btn btn-secondary">Register</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="auth-container animate-fade-in">
            <div class="text-center mb-8">
                <h2>Welcome Back</h2>
                <p class="text-light mt-2">Login to access your CropAI dashboard</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="Enter your email">
                </div>

                <div class="form-group mb-8">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required
                        placeholder="Enter your password">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <span>Login</span>
                    <div class="loader" id="loginLoader"></div>
                </button>
            </form>

            <div id="errorMessage" class="mt-4"
                style="color: #ef4444; display: none; text-align: center; font-size: 0.875rem;"></div>

            <div class="text-center mt-8">
                <p class="text-light">Don't have an account? <a href="register.html">Sign up</a></p>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>

</html>
