<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CropAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-leaf"></i> CropAI
            </a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="login.html" class="btn btn-secondary">Login</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="auth-container animate-fade-in">
            <div class="text-center mb-8">
                <h2>Create Account</h2>
                <p class="text-light mt-2">Join CropAI to empower your farming</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                </div>

                <div class="form-group mb-8">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="Create a password">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <span>Sign Up</span>
                    <div class="loader" id="registerLoader"></div>
                </button>
            </form>

            <div id="registerErrorMessage" class="mt-4"
                style="color: #ef4444; display: none; text-align: center; font-size: 0.875rem;"></div>

            <div class="text-center mt-8">
                <p class="text-light">Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>

</html>
